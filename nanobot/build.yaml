# Debian (glibc) base so nanobot's wheels (lxml, pydantic-core, ...) install
# from prebuilt manylinux wheels instead of compiling on the Pi. Python + uv
# are installed in the Dockerfile.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
args:
  # Fork ref nanobot is built from. Pinned to a commit so rebuilds pull exactly
  # this revision (and bust Docker's git-install cache layer). Bump on each
  # ha-branch change; track the moving `ha` branch only for local dev.
  NANOBOT_REF: 161ca572
labels:
  org.opencontainers.image.source: https://github.com/niradler/ha-addons
