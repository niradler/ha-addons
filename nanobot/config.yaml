name: Nanobot
version: "0.1.1"
slug: nanobot
# Prebuilt image pulled from GHCR (built locally per arch, tag = version).
# Remove this line to build on-device from the Dockerfile instead.
image: ghcr.io/niradler/ha-addons-nanobot-{arch}
description: >-
  Secured, fully-configurable personal AI agent (nanobot) with a WebUI behind
  HA Ingress, Home-Assistant control via MCP, an OpenAI-compatible API, and chat
  channels.
url: https://github.com/niradler/ha-addons/tree/main/nanobot
# s6-overlay (from the HA base image) is PID1; we do not let the supervisor
# install its own init.
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: manual
# WebUI is the nanobot websocket channel; HA Ingress proxies this port.
ingress: true
ingress_port: 8765
panel_icon: mdi:robot-happy
panel_title: Nanobot
# Optional: publish the OpenAI-compatible API on a host port. Not mapped by
# default; mapping it REQUIRES api_token (enforced fail-safe in init).
ports:
  "8900/tcp": null
ports_description:
  "8900/tcp": OpenAI-compatible API (requires api_token; see docs)
# Persistent, user-editable nanobot HOME (config.json + workspace) lives under
# the add-on's own config dir, mounted at /config and backed up with the add-on.
map:
  - addon_config:rw
# Security: NO ambient HA access. We intentionally do NOT grant homeassistant_api
# or hassio_api, so the add-on's supervisor token cannot touch HA. HA control
# works only with a user-supplied long-lived token (ha_token), used read-only by
# default. No privileged, no SYS_ADMIN.
# Add-on-only options. nanobot's own config (providers, MCP servers, tools,
# channels, …) is managed in the nanobot WebUI or by editing config.json — see
# DOCS. Secrets here are injected as ${VAR} env for config.json to reference.
options:
  log_level: info
  llm_provider: openai
  llm_model: gpt-4.1
  llm_api_key: ""
  ha_token: ""
  api_enabled: false
  api_publish_port: false
  api_port: 8900
  api_token: ""
  webui_auth: false
  secrets: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  llm_provider: str
  llm_model: str?
  llm_api_key: password?
  ha_token: password?
  api_enabled: bool
  api_publish_port: bool
  api_port: int(1024,65535)
  api_token: password?
  webui_auth: bool
  secrets:
    - password
